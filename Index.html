<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AJA Systems – Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --navy: #0D1B2A;
      --white: #F0EDE8;
      --white-dim: rgba(240,237,232,0.6);
    }
    html, body { height: 100%; background: var(--navy); color: var(--white); font-family: 'Rajdhani', sans-serif; overflow: hidden; }
    canvas#stars { position: fixed; inset: 0; z-index: 0; }
    .glow-bg {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse 60% 50% at 50% 35%, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 1;
      background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none;
    }
    .container {
      position: relative; z-index: 10; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .logo-img {
      width: clamp(160px, 28vw, 220px);
      height: auto;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.2s forwards;
      filter: drop-shadow(0 0 25px rgba(201,168,76,0.7)) drop-shadow(0 0 60px rgba(201,168,76,0.3));
      margin-bottom: 1rem;
    }
    .brand {
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
      margin-bottom: 0.2rem;
    }
    .brand-aja {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      letter-spacing: 0.3em; color: var(--white); line-height: 1;
    }
    .brand-aja span { color: var(--gold); }
    .brand-systems {
      font-family: 'Rajdhani', sans-serif; font-weight: 300;
      font-size: clamp(0.8rem, 2vw, 1.1rem);
      letter-spacing: 0.65em; color: var(--gold); text-transform: uppercase;
      margin-top: 0.1rem;
    }
    .divider {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.4rem auto;
      opacity: 0; animation: fadeUp 1s ease 0.9s forwards;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: var(--white-dim); letter-spacing: 0.05em; line-height: 1.7;
      opacity: 0; animation: fadeUp 1s ease 1.1s forwards; max-width: 420px;
    }
    .badge {
      margin-top: 1.8rem;
      display: inline-flex; align-items: center; gap: 0.6rem;
      border: 1px solid rgba(201,168,76,0.35); padding: 0.45rem 1.3rem; border-radius: 2px;
      font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold); background: rgba(201,168,76,0.06);
      opacity: 0; animation: fadeUp 1s ease 1.3s forwards;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px; background: var(--gold);
      border-radius: 50%; animation: pulse 2s infinite;
    }
    .services {
      display: flex; gap: 2rem; margin-top: 1.8rem;
      opacity: 0; animation: fadeUp 1s ease 1.5s forwards;
      flex-wrap: wrap; justify-content: center;
    }
    .service-item {
      font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--white-dim); display: flex; align-items: center; gap: 0.5rem;
    }
    .service-item::before { content: ''; width: 18px; height: 1px; background: var(--gold); opacity: 0.5; }
    .corner { position: fixed; width: 44px; height: 44px; z-index: 10; opacity: 0.25; }
    .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .footer {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.62rem; letter-spacing: 0.2em; color: rgba(240,237,232,0.2);
      text-transform: uppercase; z-index: 10; white-space: nowrap;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.6); } }
  </style>
</head>

<div class="grid-lines"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<script>
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height,
        r: Math.random()*1.3+0.2, speed: Math.random()*0.003+0.001, phase: Math.random()*Math.PI*2 });
    }
  }
  function drawStars(t) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      const a = 0.2 + 0.5*Math.sin(t*s.speed*60+s.phase);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(201,168,76,${a*0.8})`; ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resize(); initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  requestAnimationFrame(drawStars);
</script>
