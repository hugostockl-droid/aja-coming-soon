<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aja-systems.de — Kommt bald</title>
  <meta name="description" content="Maßgeschneiderte Software und Automatisierung für kleine Betriebe. Bald verfügbar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        rgb(0, 158, 224);
      --blue-dark:   rgb(0, 102, 153);
      --blue-light:  rgba(0, 158, 224, 0.10);
      --red:         rgb(225, 0, 0);
      --text:        #1a1a1a;
      --muted:       #5a5a5a;
      --border:      rgba(0,0,0,0.09);
      --bg:          #f5f8fb;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 28px 40px;
      display: flex;
      align-items: center;
    }

    .logo {
      font-family: 'Open Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0;
      text-decoration: none;
      text-transform: none;
    }
    .logo span { color: var(--blue); }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 4px;
      border-top: 4px solid var(--blue);
      padding: 56px 52px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: var(--blue-light);
      color: var(--blue-dark);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 2px;
      margin-bottom: 12px;
    }

    .red-line {
      width: 40px;
      height: 3px;
      background: var(--red);
      margin: 0 auto 28px;
      border-radius: 2px;
    }

    h1 {
      font-family: 'Jost', sans-serif;
      font-size: 40px;
      font-weight: 700;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    h1 em {
      color: var(--blue);
      font-style: normal;
    }

    .sub {
      font-family: 'Jost', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 40px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 32px;
    }

    .contact-label {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      background: var(--blue);
      border-radius: 2px;
      transition: background 0.15s;
    }
    .contact-link:hover {
      background: var(--blue-dark);
    }

    .contact-link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .location {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: 'Open Sans', sans-serif;
    }

    .location svg {
      width: 14px;
      height: 14px;
      opacity: 0.45;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 20px 40px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      font-family: 'Open Sans', sans-serif;
    }

    @media (max-width: 600px) {
      header { padding: 20px 20px; }
      .card { padding: 36px 24px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">aja<span>-systems</span>.de</a>
  </header>

  <main>
    <div class="card">
      <div class="badge">Kommt bald</div>
      <div class="red-line"></div>

      <h1>Software die<br><em>einfach</em><br>funktioniert.</h1>

      <p class="sub">
        Maßgeschneiderte Webanwendungen und Automatisierungen für kleine Betriebe —
        ohne IT-Abteilung, ohne Aufwand.
      </p>

      <hr class="divider">

      <p class="contact-label">Schon jetzt Kontakt aufnehmen</p>

      <a class="contact-link" href="mailto:info@aja-systems.de">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
        info@aja-systems.de
      </a>

      <p class="location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Region Leipzig · Sachsen
      </p>
    </div>
  </main>

  <footer>
    &copy; 2025 aja-systems.de &nbsp;<span style="color:rgb(225,0,0);">·</span>&nbsp; <a href="mailto:info@aja-systems.de" style="color: inherit;">Impressum folgt</a>
  </footer>

</body>
</html>
